{% extends 'base.html' %}
{% load static %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/login.css' %}?v=20260408-3">
{% endblock %}
{% block content %}
<div class="login-shell">
    <div class="login-card">
        <img
            src="{% static 'images/login-brand-v2.png' %}"
            alt="Saint Paul University Surigao logo"
            class="login-brand-image"
        >
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-eyebrow">Clinical Duty Scheduling System</p>

        <form method="post" class="login-form">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="login-errors">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <div class="login-field-group">
                <p class="login-field">
                    <label for="id_username">Username or Student ID</label>
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        value="{{ form.username.value|default:'' }}"
                        placeholder="e.g. C-2023-001 or admin"
                        autofocus
                        autocomplete="username"
                        required
                    >
                </p>
                <p class="login-field">
                    <label for="id_password">Password</label>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </p>
            </div>

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <button type="submit" class="btn login-submit">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
