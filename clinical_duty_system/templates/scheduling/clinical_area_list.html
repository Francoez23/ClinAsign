{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2>Clinical Areas</h2>
    <a class="btn" href="{% url 'clinical-area-create' %}">Add Area</a>
</div>
<div class="card table-card">
<table>
    <thead><tr><th>Name</th><th>Description</th></tr></thead>
    <tbody>
        {% for area in areas %}
            <tr><td>{{ area.name }}</td><td>{{ area.description }}</td></tr>
        {% empty %}
            <tr><td colspan="2">No clinical areas available.</td></tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
