{% extends 'base.html' %}
{% block content %}
<div class="page-header page-header-stack">
    <h2>My Profile</h2>
    <p>Update your personal details and account preferences.</p>
</div>
<div class="card form-card">
    {% if request.user.profile.student_id %}
    <div class="info-banner"><strong>School ID:</strong> {{ request.user.profile.student_id }}</div>
    {% endif %}
    <form method="post" class="styled-form">
        {% csrf_token %}
        <div class="form-fields">
            {{ form.as_p }}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn">Save Changes</button>
            <a class="btn btn-secondary" href="{% url 'password-change' %}">Change Password</a>
        </div>
    </form>
</div>
{% endblock %}
